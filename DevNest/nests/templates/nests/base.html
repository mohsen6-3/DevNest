{%load static %}
<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link rel="stylesheet" href="{% static 'css/nests.css' %}">
    <title>{% block title %} {% endblock %}</title>
</head>

<body>
<div class="d-flex">

    <!-- Sidebar -->
    <div class="sidebar d-flex flex-column p-2 text-white">

        <!-- Logo -->
        <div class="d-flex align-items-center mb-4">
            <!-- <div class="logo me-2">B</div> -->
            <h5 class="m-0">DevNest</h5>
        </div>

        <hr>

        <!-- Menu -->
        <ul class="nav nav-pills flex-column mb-auto gap-2">
            <li>
                <a href="#" class="nav-link active text-white">
                    <i class="bi bi-house me-2"></i> Home
                </a>
            </li>

            <li>
                <a href="#" class="nav-link text-white">
                    <i class="bi bi-speedometer2 me-2"></i> Dashboard
                </a>
            </li>

            <li>
                <a href="#" class="nav-link text-white">
                    <i class="bi bi-list-nested me-2"></i> My Nests
                </a>
            </li>

            <li>
                <a href="#" class="nav-link text-white">
                    <i class="bi bi-gear me-2"></i> Settings
                </a>
            </li>
        </ul>

        <hr>

        <!-- Profile -->
        <div class="d-flex align-items-center mt-auto">
            <!-- <img src="" class="rounded-circle me-2"> -->
            <strong>mdo</strong>
        </div>

    </div>

    <!-- Main Content -->
    <main class="flex-grow-1 p-5 bg-light">
        {% block content %}
        {% endblock %}
    </main>

</div>

</body>

</html>
