{% extends 'main/base.html' %}

{% block title %}Contact Us — DevNest{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-12 col-md-8 col-lg-6">
        <div class="card p-4" style="border:0.5px solid rgba(0,0,0,0.08) !important;border-radius:12px !important;box-shadow:none !important;">
            <h4 class="fw-bold mb-1"><i class="bi bi-envelope me-2"></i>Contact Us</h4>
            <p class="text-muted small mb-4">Have a question or feedback? Send us a message and we'll get back to you.</p>
            <form method="post">
                {% csrf_token %}
                <div class="row g-3">
                    <div class="col-12 col-md-6">
                        <label class="form-label fw-semibold small">Your Name</label>
                        <input type="text" name="name" class="form-control" required
                               value="{% if request.user.is_authenticated %}{{ request.user.get_full_name|default:request.user.username }}{% endif %}">
                    </div>
                    <div class="col-12 col-md-6">
                        <label class="form-label fw-semibold small">Email Address</label>
                        <input type="email" name="email" class="form-control" required
                               value="{% if request.user.is_authenticated %}{{ request.user.email }}{% endif %}">
                    </div>
                    <div class="col-12">
                        <label class="form-label fw-semibold small">Subject</label>
                        <input type="text" name="subject" class="form-control" maxlength="200" required>
                    </div>
                    <div class="col-12">
                        <label class="form-label fw-semibold small">Message</label>
                        <textarea name="body" class="form-control" rows="5" required></textarea>
                    </div>
                    <div class="col-12">
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-send me-1"></i>Send Message
                        </button>
                    </div>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
