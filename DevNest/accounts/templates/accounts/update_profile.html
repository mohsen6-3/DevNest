{% extends 'main/base.html' %}

{% block title %}Edit Profile — DevNest{% endblock %}

{% block content %}
<div class="d-flex justify-content-center align-items-start py-4">
    <div class="auth-card" style="max-width:560px;">
        <h4 class="fw-bold mb-1">Edit Profile</h4>
        <p class="text-muted small mb-4">Update your account details</p>

        <form action="{% url 'accounts:update_user_profile' %}" method="POST" enctype="multipart/form-data">
            {% csrf_token %}
            <div class="d-flex flex-column gap-3">

                <div class="row g-3">
                    <div class="col">
                        <div class="form-floating">
                            <input type="text" class="form-control" id="firstName" name="first_name"
                                placeholder="First name" value="{{ request.user.first_name }}" required>
                            <label for="firstName">First name</label>
                        </div>
                    </div>
                    <div class="col">
                        <div class="form-floating">
                            <input type="text" class="form-control" id="lastName" name="last_name"
                                placeholder="Last name" value="{{ request.user.last_name }}" required>
                            <label for="lastName">Last name</label>
                        </div>
                    </div>
                </div>

                <div class="form-floating">
                    <input type="email" class="form-control" id="email" name="email"
                        placeholder="name@example.com" value="{{ request.user.email }}" required>
                    <label for="email">Email address</label>
                </div>

                <div class="form-floating">
                    <input type="url" class="form-control" id="socialLink" name="social_link"
                        placeholder="https://..." value="{{ request.user.profile.social_link }}">
                    <label for="socialLink">Social link</label>
                </div>

                <div>
                    <label class="form-label fw-semibold small">About</label>
                    <textarea class="form-control" name="about" rows="3">{{ request.user.profile.about }}</textarea>
                </div>

                <div>
                    <label class="form-label fw-semibold small">Avatar</label>
                    <div class="d-flex align-items-center gap-3 mb-2">
                        <img src="{{ request.user.profile.avatar.url }}"
                            class="rounded-circle border" style="width:56px;height:56px;object-fit:cover;" alt="current avatar">
                        <span class="text-muted small">Current avatar</span>
                    </div>
                    <input type="file" name="avatar" accept="image/*" class="form-control">
                </div>

                <button class="btn btn-primary w-100 py-2" type="submit">
                    <i class="bi bi-check-lg me-1"></i> Save Changes
                </button>
            </div>
        </form>

        <div class="mt-3 text-center">
            <a href="{% url 'accounts:user_profile_view' request.user.username %}" class="text-muted small">
                &larr; Back to Profile
            </a>
        </div>
    </div>
</div>
{% endblock %}
