{% extends 'main/base.html' %}
{% load static %}

{% block title %}Sign In — DevNest{% endblock %}
{% block extra_css %}<link rel="stylesheet" href="{% static 'css/accounts-design.css' %}">{% endblock %}

{% block content %}
<div class="d-flex justify-content-center align-items-start py-5 auth-shell">
    <div class="auth-card">
        <div class="text-center mb-4">
            <h4 class="fw-bold mb-1">Welcome back</h4>
            <p class="text-muted small mb-0">Sign in to your DevNest account</p>
        </div>

        <form action="{% url 'accounts:sign_in' %}{% if 'next' in request.GET %}?next={{ request.GET.next }}{% endif %}" method="POST">
            {% csrf_token %}
            <div class="d-flex flex-column gap-3">
                <div class="form-floating">
                    <input type="text" class="form-control" id="signinUsername" placeholder="Username" name="username" required autocomplete="username">
                    <label for="signinUsername">Username</label>
                </div>
                <div class="form-floating">
                    <input type="password" class="form-control" id="signinPassword" placeholder="Password" name="password" required autocomplete="current-password">
                    <label for="signinPassword">Password</label>
                </div>
                <button class="btn btn-primary w-100 py-2" type="submit">
                    <i class="bi bi-box-arrow-in-right me-1"></i> Sign In
                </button>
            </div>
        </form>

        <p class="text-center text-muted small mt-4 mb-0">
            Don't have an account?
            <a href="{% url 'accounts:sign_up' %}{% if 'next' in request.GET %}?next={{ request.GET.next }}{% endif %}" class="text-primary fw-semibold">Sign Up</a>
        </p>
    </div>
</div>
{% endblock %}
