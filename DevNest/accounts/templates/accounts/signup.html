{% extends 'main/base.html' %}
{% load static %}

{% block title %}Sign Up — DevNest{% endblock %}
{% block extra_css %}<link rel="stylesheet" href="{% static 'css/accounts-design.css' %}">{% endblock %}

{% block content %}
<div class="d-flex justify-content-center align-items-start py-5 auth-shell">
    <div class="auth-card">
        <div class="text-center mb-4">
            <a href="/" class="text-decoration-none d-inline-flex align-items-center gap-2 mb-3">
                <img src="{% static 'images/logo.svg' %}" alt="DevNest" width="36" height="36" style="border-radius:8px;">
                <span class="fw-bold" style="font-size:17px;color:#1a1a1a;">DevNest</span>
            </a>
            <h4 class="fw-bold mb-1">Create an account</h4>
            <p class="text-muted small mb-0">Join DevNest and start learning</p>
        </div>

        <form action="{% url 'accounts:sign_up' %}{% if 'next' in request.GET %}?next={{ request.GET.next }}{% endif %}" method="POST" enctype="multipart/form-data">
            {% csrf_token %}
            <div class="d-flex flex-column gap-3">

                <div class="row g-3">
                    <div class="col">
                        <div class="form-floating">
                            <input type="text" class="form-control" id="firstName" placeholder="First name" name="first_name" required>
                            <label for="firstName">First name</label>
                        </div>
                    </div>
                    <div class="col">
                        <div class="form-floating">
                            <input type="text" class="form-control" id="lastName" placeholder="Last name" name="last_name" required>
                            <label for="lastName">Last name</label>
                        </div>
                    </div>
                </div>

                <div class="form-floating">
                    <input type="email" class="form-control" id="signupEmail" placeholder="name@example.com" name="email" required autocomplete="email">
                    <label for="signupEmail">Email address</label>
                </div>

                <div class="form-floating">
                    <input type="text" class="form-control" id="signupUsername" placeholder="Username" name="username" required autocomplete="username">
                    <label for="signupUsername">Username</label>
                </div>

                <div class="form-floating">
                    <input type="password" class="form-control" id="signupPassword" placeholder="Password" name="password" required autocomplete="new-password">
                    <label for="signupPassword">Password</label>
                </div>

                <div class="form-floating">
                    <input type="url" class="form-control" id="socialLink" placeholder="https://..." name="social_link">
                    <label for="socialLink">Social link (optional)</label>
                </div>

                <div>
                    <label class="form-label fw-semibold small">About (optional)</label>
                    <textarea class="form-control" name="about" rows="2" placeholder="A short bio..."></textarea>
                </div>

                <div>
                    <label class="form-label fw-semibold small">Avatar (optional)</label>
                    <input type="file" name="avatar" accept="image/*" class="form-control">
                </div>

                <button class="btn btn-primary w-100 py-2" type="submit">
                    <i class="bi bi-person-check me-1"></i> Create Account
                </button>
            </div>
        </form>

        <p class="text-center text-muted small mt-4 mb-0">
            Already have an account?
            <a href="{% url 'accounts:sign_in' %}{% if 'next' in request.GET %}?next={{ request.GET.next }}{% endif %}" class="text-primary fw-semibold">Sign In</a>
        </p>
    </div>
</div>
{% endblock %}
