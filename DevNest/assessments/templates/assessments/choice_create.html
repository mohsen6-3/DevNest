{% extends "nests/base.html" %}
{% load static %}
{% block extra_css %}<link rel="stylesheet" href="{% static 'css/assessments-design.css' %}">{% endblock %}

{% block title %}Add Choice{% endblock %}
{% block content %}
<h2>Add Choice to: {{ question.text }}</h2>
<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button class="btn btn-success" type="submit">Save Choice</button>
</form>
{% endblock %}
