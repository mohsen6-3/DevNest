{% extends 'posts/base.html' %}
{% load static %}

{% block title %}Delete Assessment{% endblock %}

{% block content %}
<h1>Delete Assessment</h1>
<form method="post" action="{% url 'assessments:assessment_delete_view' pk=assessment.pk %}">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="btn btn-danger">Delete Assessment</button>
</form>
{% endblock %}
