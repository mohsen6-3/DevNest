{% extends "nests/base.html" %}
{% load static %}
{% block extra_css %}<link rel="stylesheet" href="{% static 'css/assessments-design.css' %}">{% endblock %}

{% block title %}Add Question{% endblock %}
{% block content %}
<h2>Add Question to: {{ assessment.title }}</h2>
<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button class="btn btn-success" type="submit">Save Question</button>
</form>
{% endblock %}
